name: Deploy to ECS

on:
  push:
    branches:
      - master

permissions:
  id-token: write   # Required for OIDC token issuance
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: quransays-prod-web
  ECS_CLUSTER: quransays-prod-cluster
  ECS_SERVICE: quransays-prod-svc
  CONTAINER_NAME: web
  CHROMA_INIT_CONTAINER_NAME: chroma-init

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # No access key pairs — OIDC short-lived tokens only

      - name: Update deploy role trust and permissions for both repos
        run: |
          # Update trust policy to allow both QuranSays and QuranGPT
          aws iam update-assume-role-policy \
            --role-name quransays-prod-github-deploy \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:aws:iam::519568490345:oidc-provider/token.actions.githubusercontent.com"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
                  },
                  "StringLike": {
                    "token.actions.githubusercontent.com:sub": "repo:Noor-e-Bilal/*:ref:refs/heads/master"
                  }
                }
              }]
            }'
          
          # Also add the QuranGPT ECR repo permission to the deploy policy
          ACCOUNT_ID="519568490345"
          QURANSAYS_ECR="arn:aws:ecr:us-east-1:${ACCOUNT_ID}:repository/quransays-prod-web"
          QURANGPT_ECR="arn:aws:ecr:us-east-1:${ACCOUNT_ID}:repository/qurangpt-prod-web"
          
          # Get existing ECR push policy statement, add QuranGPT ECR
          aws iam put-role-policy \
            --role-name quransays-prod-github-deploy \
            --policy-name quransays-prod-github-deploy-policy \
            --policy-document "{
              \"Version\": \"2012-10-17\",
              \"Statement\": [
                {
                  \"Sid\": \"ECRGetAuthToken\",
                  \"Effect\": \"Allow\",
                  \"Action\": [\"ecr:GetAuthorizationToken\"],
                  \"Resource\": [\"*\"]
                },
                {
                  \"Sid\": \"ECRPushImage\",
                  \"Effect\": \"Allow\",
                  \"Action\": [
                    \"ecr:BatchCheckLayerAvailability\",
                    \"ecr:GetDownloadUrlForLayer\",
                    \"ecr:BatchGetImage\",
                    \"ecr:InitiateLayerUpload\",
                    \"ecr:UploadLayerPart\",
                    \"ecr:CompleteLayerUpload\",
                    \"ecr:PutImage\"
                  ],
                  \"Resource\": [\"${QURANSAYS_ECR}\", \"${QURANGPT_ECR}\"]
                },
                {
                  \"Sid\": \"ECSRegisterTaskDef\",
                  \"Effect\": \"Allow\",
                  \"Action\": [\"ecs:RegisterTaskDefinition\", \"ecs:DescribeTaskDefinition\"],
                  \"Resource\": [\"*\"]
                },
                {
                  \"Sid\": \"ECSDeployService\",
                  \"Effect\": \"Allow\",
                  \"Action\": [\"ecs:UpdateService\", \"ecs:DescribeServices\"],
                  \"Resource\": [\"arn:aws:ecs:us-east-1:${ACCOUNT_ID}:service/quransays-prod-cluster/quransays-prod-svc\", \"arn:aws:ecs:us-east-1:${ACCOUNT_ID}:service/qurangpt-prod-cluster/qurangpt-prod-svc\"]
                },
                {
                  \"Sid\": \"ECSDescribeTasks\",
                  \"Effect\": \"Allow\",
                  \"Action\": [\"ecs:DescribeTasks\", \"ecs:ListTasks\"],
                  \"Resource\": [\"*\"],
                  \"Condition\": {
                    \"ArnEquals\": {
                      \"ecs:cluster\": [\"arn:aws:ecs:us-east-1:${ACCOUNT_ID}:cluster/quransays-prod-cluster\", \"arn:aws:ecs:us-east-1:${ACCOUNT_ID}:cluster/qurangpt-prod-cluster\"]
                    }
                  }
                },
                {
                  \"Sid\": \"ECSDescribeTaskDef\",
                  \"Effect\": \"Allow\",
                  \"Action\": [\"ecs:DescribeTaskDefinition\"],
                  \"Resource\": [\"*\"]
                },
                {
                  \"Sid\": \"IAMPassRoleToECS\",
                  \"Effect\": \"Allow\",
                  \"Action\": [\"iam:PassRole\"],
                  \"Resource\": [\"arn:aws:iam::${ACCOUNT_ID}:role/quransays-prod-ecs-*\", \"arn:aws:iam::${ACCOUNT_ID}:role/qurangpt-prod-ecs-*\"],
                  \"Condition\": {
                    \"StringEquals\": {
                      \"iam:PassedToService\": \"ecs-tasks.amazonaws.com\"
                    }
                  }
                }
              ]
            }'

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # DB and chroma-seed are now committed in the repo (data/ directory).
      # The S3 sync step was removed because the bucket didn't exist.

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            --file apps/web/Dockerfile \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition quransays-prod-app \
            --query taskDefinition \
            > task-def.json

      - name: Update task definition with new image (web container)
        id: task-def-web
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Update task definition with new image (chroma-init container)
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-web.outputs.task-definition }}
          container-name: ${{ env.CHROMA_INIT_CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
