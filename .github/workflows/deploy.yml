name: Deploy to ECS

on:
  push:
    branches:
      - master

permissions:
  id-token: write   # Required for OIDC token issuance
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: quransays-prod-web
  ECS_CLUSTER: quransays-prod-cluster
  ECS_SERVICE: quransays-prod-svc
  CONTAINER_NAME: web
  CHROMA_INIT_CONTAINER_NAME: chroma-init

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # No access key pairs — OIDC short-lived tokens only

      # ── Re-apply deploy role inline policy ──────────────────────────────────
      # This runs at the start of every deploy to ensure the GitHub Actions
      # role has the correct minimum-privilege permissions. The role was
      # initially created by Terraform with the same policy.
      - name: Re-apply deploy role inline policy
        run: |
          ACCOUNT_ID="519568490345"
          aws iam put-role-policy \
            --role-name quransays-prod-github-deploy \
            --policy-name quransays-prod-github-deploy-policy \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "ECRGetAuth",
                  "Effect": "Allow",
                  "Action": ["ecr:GetAuthorizationToken"],
                  "Resource": ["*"]
                },
                {
                  "Sid": "ECRPush",
                  "Effect": "Allow",
                  "Action": ["ecr:BatchCheckLayerAvailability", "ecr:GetDownloadUrlForLayer", "ecr:BatchGetImage", "ecr:InitiateLayerUpload", "ecr:UploadLayerPart", "ecr:CompleteLayerUpload", "ecr:PutImage"],
                  "Resource": ["arn:aws:ecr:us-east-1:'$ACCOUNT_ID':repository/quransays-prod-web", "arn:aws:ecr:us-east-1:'$ACCOUNT_ID':repository/qurangpt-prod-web"]
                },
                {
                  "Sid": "ECSAll",
                  "Effect": "Allow",
                  "Action": ["ecs:RegisterTaskDefinition", "ecs:DescribeTaskDefinition", "ecs:UpdateService", "ecs:DescribeServices", "ecs:DescribeTasks", "ecs:ListTasks"],
                  "Resource": ["*"]
                },
                {
                  "Sid": "IAMPassRole",
                  "Effect": "Allow",
                  "Action": ["iam:PassRole"],
                  "Resource": ["arn:aws:iam::'$ACCOUNT_ID':role/quransays-prod-ecs-*", "arn:aws:iam::'$ACCOUNT_ID':role/qurangpt-prod-ecs-*"],
                  "Condition": {"StringEquals": {"iam:PassedToService": "ecs-tasks.amazonaws.com"}}
                }
              ]
            }'

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # DB and chroma-seed are now committed in the repo (data/ directory).
      # The S3 sync step was removed because the bucket didn't exist.

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            --file apps/web/Dockerfile \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition quransays-prod-app \
            --query taskDefinition \
            > task-def.json

      - name: Update task definition with new image (web container)
        id: task-def-web
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Update task definition with new image (chroma-init container)
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-web.outputs.task-definition }}
          container-name: ${{ env.CHROMA_INIT_CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
